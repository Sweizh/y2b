name: YT2BILI Pipeline

# 触发条件:Worker 通过 repository_dispatch 事件触发
# Worker 调用 POST /repos/{owner}/{repo}/dispatches,body 含 event_type: pipeline_dispatch
on:
  repository_dispatch:
    types: [pipeline_dispatch]
  # 允许手动触发用于调试
  workflow_dispatch:

# 显式声明最小权限:本 workflow 仅需读取仓库内容,无需 write / packages 等
permissions:
  contents: read

# 流水线只允许同时运行一个,避免 B 站 / YouTube 限流
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # 单视频最坏约 40min(下载+ASR+上传),多视频需放宽到 120min
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          PIPELINE_TOKEN: ${{ secrets.PIPELINE_TOKEN }}
        run: |
          if [ -z "$WORKER_URL" ] || [ -z "$PIPELINE_TOKEN" ]; then
            echo "::error::WORKER_URL 或 PIPELINE_TOKEN secret 未配置"
            exit 1
          fi
          python scripts/main.py
