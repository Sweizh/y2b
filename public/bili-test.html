<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel IP B 站登录风控测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.6;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .meta-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .meta-item {
      display: flex;
      gap: 6px;
    }
    .meta-label { color: #888; }
    .meta-value { color: #4ade80; }
    .meta-value.warn { color: #fbbf24; }
    .meta-value.err { color: #f87171; }
    .card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 16px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      padding: 0 16px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #404040;
      background: transparent;
      color: #e5e5e5;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #1f1f1f; }
    .qrcode-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }
    .qrcode-img {
      width: 240px;
      height: 240px;
      border-radius: 8px;
      border: 1px solid #262626;
      background: #fff;
      object-fit: contain;
    }
    .countdown {
      font-size: 12px;
      color: #888;
      font-family: ui-monospace, monospace;
    }
    .countdown.urgent { color: #fbbf24; }
    .countdown.expired { color: #f87171; }
    .status-line {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: ui-monospace, monospace;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .status-info { background: #1a1a1a; color: #888; }
    .status-success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status-error { background: #2a0e0e; color: #f87171; border: 1px solid #7f1d1d; }
    .status-warn { background: #2a230e; color: #fbbf24; border: 1px solid #78350f; }
    .log-section {
      margin-top: 24px;
    }
    .log-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      font-family: ui-monospace, monospace;
    }
    .log-box {
      background: #0d0d0d;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 14px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #a3a3a3;
      max-height: 280px;
      overflow-y: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #525252; }
    .log-tag { color: #60a5fa; }
    .log-tag.err { color: #f87171; }
    .log-tag.ok { color: #4ade80; }
    .result-section {
      margin-top: 16px;
      padding: 14px 16px;
      background: #0d0d0d;
      border: 1px solid #262626;
      border-radius: 8px;
      font-size: 12px;
      font-family: ui-monospace, monospace;
      color: #a3a3a3;
      word-break: break-all;
      display: none;
    }
    .result-section.visible { display: block; }
    .result-row { padding: 4px 0; }
    .result-key { color: #60a5fa; }
    .result-val { color: #e5e5e5; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>
<body>
  <div class="container">
    <h1>Vercel IP B 站登录风控测试</h1>
    <p class="subtitle">验证 Vercel Edge 出口 IP 能否绕过 B 站对 Cloudflare Worker IP 的风控(-412)</p>

    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-label">Vercel Region:</span>
        <span class="meta-value" id="meta-region">查询中…</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">部署域:</span>
        <span class="meta-value" id="meta-host">--</span>
      </div>
    </div>

    <div class="card">
      <div class="actions">
        <button class="btn-primary" id="btn-fetch">获取二维码</button>
        <button class="btn-secondary" id="btn-refresh" style="display:none">刷新二维码</button>
        <button class="btn-secondary" id="btn-clear-log">清空日志</button>
      </div>

      <div class="qrcode-wrap" id="qrcode-wrap" style="display:none">
        <img class="qrcode-img" id="qrcode-img" alt="B 站登录二维码">
        <div class="countdown" id="countdown">剩余 180 秒</div>
      </div>

      <div class="status-line status-info" id="status-line">点击「获取二维码」开始测试</div>

      <div class="result-section" id="result-section">
        <div class="result-row"><span class="result-key">uname:</span> <span class="result-val" id="result-uname">--</span></div>
        <div class="result-row"><span class="result-key">SESSDATA(前8位):</span> <span class="result-val" id="result-sessdata">--</span></div>
        <div class="result-row"><span class="result-key">bili_jct(前8位):</span> <span class="result-val" id="result-jct">--</span></div>
        <div class="result-row"><span class="result-key">DedeUserID:</span> <span class="result-val" id="result-uid">--</span></div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-title">请求日志</div>
      <div class="log-box" id="log-box"></div>
    </div>
  </div>

  <script>
    // ====== 状态 ======
    var qrcodeKey = null;
    var expiresAt = 0;
    var pollTimer = null;
    var countdownTimer = null;

    // ====== DOM ======
    var btnFetch = document.getElementById('btn-fetch');
    var btnRefresh = document.getElementById('btn-refresh');
    var btnClearLog = document.getElementById('btn-clear-log');
    var qrcodeWrap = document.getElementById('qrcode-wrap');
    var qrcodeImg = document.getElementById('qrcode-img');
    var countdownEl = document.getElementById('countdown');
    var statusLine = document.getElementById('status-line');
    var logBox = document.getElementById('log-box');
    var resultSection = document.getElementById('result-section');
    var metaRegion = document.getElementById('meta-region');
    var metaHost = document.getElementById('meta-host');

    // ====== 元信息 ======
    metaHost.textContent = location.host;
    // 通过 fetch /bili/qrcode 响应头里的 x-vercel-id 拿 region,首次 fetch 后更新

    // ====== 日志 ======
    function log(tag, msg, level) {
      var t = new Date().toISOString().split('T')[1].replace('Z', '');
      var cls = level === 'err' ? 'err' : (level === 'ok' ? 'ok' : '');
      var entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = '<span class="log-time">' + t + '</span> <span class="log-tag ' + cls + '">[' + tag + ']</span> ' + msg;
      logBox.appendChild(entry);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function setStatus(text, type) {
      statusLine.textContent = text;
      statusLine.className = 'status-line status-' + (type || 'info');
    }

    function clearTimers() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    }

    function reset() {
      clearTimers();
      qrcodeKey = null;
      expiresAt = 0;
      qrcodeWrap.style.display = 'none';
      btnRefresh.style.display = 'none';
      resultSection.classList.remove('visible');
    }

    // ====== 获取二维码 ======
    function fetchQrcode() {
      reset();
      btnFetch.disabled = true;
      btnFetch.textContent = '获取中…';
      setStatus('正在请求 Vercel Edge → B 站 passport.qrcode/generate …', 'info');

      log('FETCH', 'GET /bili/qrcode', '');
      fetch('/bili/qrcode', { method: 'GET' })
        .then(function (resp) {
          // 从响应头读 Vercel region
          var region = resp.headers.get('x-vercel-id') || '';
          if (region) {
            metaRegion.textContent = region;
            log('META', 'x-vercel-id: ' + region, '');
          }
          // 先读 text 再 JSON.parse,非 JSON 时显示原始内容便于调试
          return resp.text().then(function (text) {
            var data;
            try {
              data = JSON.parse(text);
            } catch (e) {
              log('RAW', 'HTTP ' + resp.status + ' CT=' + (resp.headers.get('content-type') || '?') + ' len=' + text.length, 'err');
              log('RAW_BODY', text.slice(0, 500), 'err');
              throw new Error('响应不是 JSON(HTTP ' + resp.status + ', CT=' + (resp.headers.get('content-type') || '?') + ')');
            }
            return { data: data, status: resp.status };
          });
        })
        .then(function (r) {
          var d = r.data;
          log('RESP', 'HTTP ' + r.status + '  ' + JSON.stringify(d).slice(0, 300), d.error ? 'err' : 'ok');

          if (d.error) {
            // 风控典型返回
            var errMsg = '✕ 失败';
            if (d.bili_code === -412 || (d.bili_message || '').indexOf('banned') >= 0) {
              errMsg = '✕ B 站风控拦截(-412)';
            } else if (d.bili_code) {
              errMsg = '✕ B 站返回 code=' + d.bili_code;
            } else {
              errMsg = '✕ ' + (d.error || '未知错误');
            }
            setStatus(errMsg + (d.bili_message ? '(' + d.bili_message + ')' : ''), 'error');
            if (d.bodyPreview) log('BODY', d.bodyPreview, 'err');
            return;
          }
          if (!d.qrcode_url || !d.qrcode_key) {
            setStatus('✕ 响应缺少 qrcode_url/qrcode_key', 'error');
            return;
          }
          // 成功拿到二维码
          qrcodeKey = d.qrcode_key;
          expiresAt = d.expires_at;
          // qrcode_url 是扫码跳转网页 URL,不是图片,需用 QR 库转成二维码图片
          if (typeof qrcode === 'undefined') {
            setStatus('✕ QR 库未加载(CDN 失败?),请检查网络', 'error');
            log('QR_ERR', 'qrcode-generator 库未加载', 'err');
            return;
          }
          try {
            var qr = qrcode(0, 'M');
            qr.addData(d.qrcode_url);
            qr.make();
            qrcodeImg.src = qr.createDataURL(8, 2);
          } catch (e) {
            setStatus('✕ 二维码生成失败:' + e.message, 'error');
            log('QR_ERR', (e && e.message) ? e.message : String(e), 'err');
            return;
          }
          qrcodeWrap.style.display = 'flex';
          btnRefresh.style.display = 'inline-flex';
          setStatus('✓ 拿到二维码!请用 B 站 App 扫码', 'success');
          log('OK', 'qrcode_key=' + qrcodeKey.slice(0, 16) + '…', 'ok');

          startCountdown();
          startPolling();
        })
        .catch(function (e) {
          log('ERR', (e && e.message) ? e.message : String(e), 'err');
          setStatus('✕ 请求失败:' + ((e && e.message) || e), 'error');
        })
        .finally(function () {
          btnFetch.disabled = false;
          btnFetch.textContent = '获取二维码';
        });
    }

    // ====== 倒计时 ======
    function startCountdown() {
      countdownTimer = setInterval(function () {
        var remain = expiresAt - Math.floor(Date.now() / 1000);
        if (remain <= 0) {
          countdownEl.textContent = '已过期';
          countdownEl.className = 'countdown expired';
          clearTimers();
          setStatus('二维码已过期,点「刷新二维码」重试', 'warn');
          return;
        }
        countdownEl.textContent = '剩余 ' + remain + ' 秒';
        countdownEl.className = remain < 30 ? 'countdown urgent' : 'countdown';
      }, 1000);
    }

    // ====== 轮询扫码状态 ======
    function startPolling() {
      pollTimer = setInterval(function () {
        if (!qrcodeKey) return;
        fetch('/bili/qrcode-status?qrcode_key=' + encodeURIComponent(qrcodeKey))
          .then(function (resp) {
            return resp.text().then(function (text) {
              try { return JSON.parse(text); }
              catch (e) {
                log('POLL_RAW', 'HTTP ' + resp.status + ': ' + text.slice(0, 300), 'err');
                throw e;
              }
            });
          })
          .then(function (d) {
            if (d.vercelRegion && metaRegion.textContent === '查询中…') {
              metaRegion.textContent = d.vercelRegion;
            }
            if (d.status === 'waiting') {
              setStatus('等待扫码…', 'info');
            } else if (d.status === 'scanned') {
              setStatus('已扫码,请在手机上确认登录', 'warn');
              log('POLL', 'scanned', '');
            } else if (d.status === 'success') {
              clearTimers();
              setStatus('✓ 登录成功!Vercel IP 完全可绕过 B 站风控', 'success');
              log('POLL', 'success: uname=' + (d.uname || '(未知)'), 'ok');
              showResult(d);
            } else if (d.status === 'expired') {
              clearTimers();
              setStatus('二维码已过期', 'warn');
            } else if (d.status === 'error') {
              clearTimers();
              var msg = d.message || '未知错误';
              if (msg.indexOf('-412') >= 0 || msg.indexOf('banned') >= 0) {
                setStatus('✕ B 站风控拦截(扫码后被 ban):' + msg, 'error');
              } else {
                setStatus('✕ 轮询失败:' + msg, 'error');
              }
              log('POLL', 'error: ' + JSON.stringify(d).slice(0, 300), 'err');
            }
          })
          .catch(function (e) {
            log('POLL_ERR', (e && e.message) ? e.message : String(e), 'err');
          });
      }, 2000);
    }

    // ====== 显示登录成功结果 ======
    function showResult(d) {
      resultSection.classList.add('visible');
      document.getElementById('result-uname').textContent = '(status 接口未返回,需调 nav)';
      document.getElementById('result-sessdata').textContent = d.sessdata ? d.sessdata.slice(0, 8) + '…' : '--';
      document.getElementById('result-jct').textContent = d.bili_jct ? d.bili_jct.slice(0, 8) + '…' : '--';
      document.getElementById('result-uid').textContent = d.dede_user_id || '--';
    }

    // ====== 事件绑定 ======
    btnFetch.addEventListener('click', fetchQrcode);
    btnRefresh.addEventListener('click', fetchQrcode);
    btnClearLog.addEventListener('click', function () { logBox.innerHTML = ''; });

    // 页面加载时提示
    log('READY', '测试页就绪。当前域:' + location.host + '。点击按钮开始测试。', '');
  </script>
</body>
</html>
