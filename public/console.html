<!DOCTYPE html>
<html lang="zh-CN" class="dark" data-theme="dark" style="color-scheme: dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c100f">
    <title>YT2BILI · 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="/css/dist/app.css">
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <script src="/js/qrcode.js"></script>
    <style>

            text-align: left;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted-foreground);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table td {
            padding: 10px 12px;

            border-bottom: 1px solid var(--border);
            vertical-align: middle;

<body class="min-h-screen antialiased">

<!-- ===== Top horizontal navigation ===== -->

  <div class="flex items-center gap-1 md:gap-6">
    <a href="/console.html" class="top-nav-item font-semibold" style="color:var(--foreground);border:0">YT2BILI</a>
    <div class="top-nav-items" data-open="false">
      <button class="top-nav-item" data-view-target="bili" data-active="true">B 站</button>
      <button class="top-nav-item" data-view-target="youtube">YouTube</button>
      <button class="top-nav-item" data-view-target="general">通用</button>
      <button class="top-nav-item" data-view-target="status">运行状态</button>
    </div>
  </div>
  <!-- 右侧:Ctrl+K + 主题 + 退出 -->

    <button class="top-nav-item" id="cmdk-trigger" title="命令面板 (Ctrl+K)">
      <span style="font-family:var(--font-mono);font-size:11px">Ctrl K</span>
    </button>
    <button data-dom-id="theme-toggle-btn" class="top-nav-item" aria-label="切换主题">
      <span id="theme-toggle-icon">◐</span>
    </button>
    <button data-dom-id="logout-btn" class="top-nav-item" aria-label="退出登录">退出</button>
    <button id="mobile-menu-btn" class="md:hidden top-nav-item" aria-label="打开菜单">☰</button>
  </div>
</nav>

<!-- 移动端菜单遮罩 -->
<div id="sidebar-overlay" class="fixed inset-0 z-30 hidden" style="background:rgba(0,0,0,0.6);backdrop-filter:blur(2px)"></div>

<!-- ===== Main content:4 个独立视图容器 ===== -->
<main class="max-w-6xl mx-auto px-4 md:px-6 py-8">

  <!-- ============================================================ -->
  <!-- B 站视图                                                      -->
  <!-- ============================================================ -->
  <div class="view" data-view="bili" data-active="true">
    <header class="mb-6">
      <h1 class="text-2xl font-semibold tracking-tight">B 站配置</h1>
      <p class="text-sm mt-1" style="color:var(--muted-foreground)">扫码登录、Cookie 管理、检测连接状态</p>
    </header>

    <section id="section-credentials" class="space-y-6">
      <!-- 登录状态卡片 -->
      <div class="surface-card p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-base font-medium">登录状态</h2>
          <div class="flex items-center gap-2">
            <button data-dom-id="bili-qrcode-login" class="btn-accent btn-xs">扫码登录 B 站</button>
            <button data-dom-id="bili-check-btn" class="btn-ghost btn-xs">检测</button>
            <span data-dom-id="bili-login-status" class="text-xs" style="color:var(--muted-foreground)">未登录</span>
          </div>
        </div>
        <!-- 修改密码 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-xs mb-1 block" style="color:var(--muted-foreground)">管理密码</label>
            <span data-dom-id="admin-password-status" class="input-base flex items-center" style="color:var(--muted-foreground)">--</span>
          </div>
          <div class="flex items-end">
            <button data-dom-id="change-password-btn" class="btn-ghost btn-xs">修改密码</button>
          </div>
        </div>
      </div>

      <!-- 手动凭证 collapsible -->
      <div class="surface-card p-5">
        <button type="button" data-dom-id="bili-manual-toggle" class="collapsible-trigger" data-state="collapsed">
          <span>显示手动凭证</span>
        </button>
        <div data-dom-id="bili-manual-wrap" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4" style="display:none">
          <div class="flex flex-col">
            <label for="fld-bili-sessdata" class="text-xs mb-1 block" style="color:var(--muted-foreground)">B站 SESSDATA</label>
            <input id="fld-bili-sessdata" type="password" value="" placeholder="未设置" readonly class="input-base">
          </div>
          <div class="flex flex-col">
            <label for="fld-bili-jct" class="text-xs mb-1 block" style="color:var(--muted-foreground)">B站 bili_jct</label>
            <input id="fld-bili-jct" type="password" value="" placeholder="未设置" readonly class="input-base">
          </div>
          <div class="flex flex-col">
            <label for="fld-bili-buvid3" class="text-xs mb-1 block" style="color:var(--muted-foreground)">B站 buvid3</label>
            <input id="fld-bili-buvid3" type="password" value="" placeholder="未设置" readonly class="input-base">
          </div>
          <div class="flex flex-col">
            <label for="fld-bili-ac-time-value" class="text-xs mb-1 block" style="color:var(--muted-foreground)">B站 ac_time_value</label>
            <input id="fld-bili-ac-time-value" type="password" value="" placeholder="未设置" readonly class="input-base">
          </div>
        </div>
      </div>

      <!-- 保存按钮 -->
      <div class="flex justify-end">
        <button data-dom-id="credentials-save-btn" class="btn-accent" style="padding:0 28px;">保存</button>
      </div>
    </section>
  </div>

  <!-- ============================================================ -->
  <!-- YouTube 视图                                                  -->
  <!-- ============================================================ -->
  <div class="view" data-view="youtube">
    <header class="mb-6">
      <h1 class="text-2xl font-semibold tracking-tight">YouTube 配置</h1>
      <p class="text-sm mt-1" style="color:var(--muted-foreground)">OAuth 登录、API Key、Cookie、频道管理</p>

    <section id="section-channels" class="space-y-6">

        <div class="flex items-center justify-between mb-4">

            <span data-dom-id="yt-login-status" class="text-xs" style="color:var(--muted-foreground)">未登录</span>
          </div>
        </div>
        <!-- OAuth 配置 collapsible -->
        <button type="button" data-dom-id="yt-oauth-config-toggle" class="collapsible-trigger" data-state="collapsed">
          <span>OAuth 配置</span>
        </button>
        <div data-dom-id="yt-oauth-config-wrap" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4" style="display:none">
          <div class="flex flex-col">
            <label for="fld-yt-oauth-client-id" class="text-xs mb-1 block" style="color:var(--muted-foreground)">YouTube OAuth Client ID</label>
            <input id="fld-yt-oauth-client-id" type="text" value="" placeholder="未设置" class="input-base">
          </div>
          <div class="flex flex-col">
            <label for="fld-yt-oauth-client-secret" class="text-xs mb-1 block" style="color:var(--muted-foreground)">YouTube OAuth Client Secret</label>
            <input id="fld-yt-oauth-client-secret" type="password" value="" placeholder="未设置" class="input-base">
          </div>
          <div class="md:col-span-2 flex flex-col">
            <label for="fld-yt-oauth-redirect-uri" class="text-xs mb-1 block" style="color:var(--muted-foreground)">YouTube OAuth Redirect URI</label>
            <input id="fld-yt-oauth-redirect-uri" type="text" value="" placeholder="未设置" class="input-base">
          </div>
        </div>
      </div>

      <!-- YouTube API Key / Cookie / GitHub Token + 仓库 -->
      <div class="surface-card p-5 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label for="fld-yt-api-key" class="text-xs mb-1 block" style="color:var(--muted-foreground)">YouTube API Key</label>
            <input id="fld-yt-api-key" type="text" value="" placeholder="未设置" readonly class="input-base">
          </div>
          <div class="flex flex-col">
            <label for="fld-github-repo" class="text-xs mb-1 block" style="color:var(--muted-foreground)">GitHub 仓库</label>

          <textarea id="fld-yt-cookie" rows="2" readonly placeholder="未设置" class="input-base" style="height:auto;padding:10px 12px;resize:none;font-size:11px;"></textarea>
        </div>

    <section id="section-ai-services" class="space-y-6">

            <label for="fld-asr-api-url" class="text-xs mb-1 block" style="color:var(--muted-foreground)">语音识别 API 地址</label>

          <div class="flex flex-col">

            <div class="flex items-center gap-2">
              <input id="fld-asr-api-key" type="password" value="" placeholder="未设置" readonly class="input-base">
              <button class="btn-ghost btn-xs shrink-0">测试</button>
            </div>
          </div>
          <div class="flex flex-col">
            <label for="fld-translate-api-url" class="text-xs mb-1 block" style="color:var(--muted-foreground)">翻译 API 地址</label>
            <div class="flex items-center gap-2">
              <input id="fld-translate-api-url" type="text" value="" placeholder="未设置" readonly class="input-base" style="font-size:11px;">
              <button class="btn-ghost btn-xs shrink-0">测试</button>
            </div>
          </div>
          <div class="flex flex-col">
            <label for="fld-translate-api-key" class="text-xs mb-1 block" style="color:var(--muted-foreground)">翻译 API 密钥</label>
            <div class="flex items-center gap-2">
              <input id="fld-translate-api-key" type="password" value="" placeholder="未设置" readonly class="input-base">
              <button class="btn-ghost btn-xs shrink-0">测试</button>
            </div>

        </div>

          <button data-dom-id="ai-save-btn" class="btn-accent">保存</button>

  <!-- ============================================================ -->

    <section id="section-status" class="space-y-6">

                <th scope="col">BV 号</th>
                <th scope="col">频道</th>
                <th scope="col">状态</th>

    </div>

</div>

<script type="module" src="/js/dist/console.js"></script>

<!-- OAuth 回调处理:检测 URL hash 并通过 postMessage 通知 opener 后关闭窗口 -->
<script>
  (function(){
    if(!window.location.hash)return;
    var hash=window.location.hash.slice(1);
    var parts=hash.split('&');
    var first=parts[0]||'';
    var params={};
    parts.forEach(function(p){
      var idx=p.indexOf('=');
      if(idx>0){params[decodeURIComponent(p.slice(0,idx))]=decodeURIComponent(p.slice(idx+1));}
    });
    var result=null;
    if(first.indexOf('youtube-oauth-success')===0){
      result={type:'yt-oauth-result',success:true,email:params.email||'',cookie_error:params.cookie_error||''};
    }else if(first.indexOf('youtube-oauth-partial')===0){
      result={type:'yt-oauth-result',success:true,partial:true,email:params.email||'',error:params.cookie_error||'Cookie 铸造失败'};
    }else if(first.indexOf('youtube-oauth-failed')===0){
      result={type:'yt-oauth-result',success:false,error:params.error||'OAuth 登录失败'};
    }
    if(result){
      // SEC-04: targetOrigin 用具体域而非 '*',防止 OAuth 邮箱外泄给任意站点
      try{window.opener&&window.opener.postMessage(result,window.location.origin);}catch(e){}
      document.title='OAuth 登录完成';
      // SEC-01: 用 DOM API + textContent 构造,避免 URL hash 字段注入 XSS
      var wrap=document.createElement('div');
      wrap.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:var(--font-sans),sans-serif;background:var(--bg);color:var(--fg)';
      var p1=document.createElement('p');
      p1.style.cssText='font-family:var(--font-serif);font-size:18px;font-weight:500';
      p1.textContent=result.success?'登录成功':'登录失败';
      var p2=document.createElement('p');
      p2.style.cssText='font-family:var(--font-mono);font-size:12px;color:var(--fg-muted)';
      p2.textContent=result.error||result.email||'';
      var a=document.createElement('a');
      a.href='javascript:void(0)';
      a.style.cssText='font-family:var(--font-mono);font-size:11px;color:var(--accent);text-decoration:underline;letter-spacing:0.08em';
      a.textContent='CLOSE WINDOW';
      a.onclick=function(){try{window.close();}catch(e){}};
      wrap.appendChild(p1);wrap.appendChild(p2);wrap.appendChild(a);
      document.body.innerHTML='';
      document.body.appendChild(wrap);
      setTimeout(function(){try{window.close();}catch(e){}},800);
    }
  })();
</script>

</body>
