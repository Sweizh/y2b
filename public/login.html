    <style id="theme-vars">
/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  
  /* solo-design consumption aliases: explicit prefix for fill-html-head.mjs */
  --apple-background: var(--background, #ffffff);
  --apple-foreground: var(--foreground, #0f172a);
  --apple-card: var(--card, var(--background));
  --apple-card-foreground: var(--card-foreground, var(--foreground));
  --apple-popover: var(--popover, var(--card));
  --apple-popover-foreground: var(--popover-foreground, var(--card-foreground, var(--foreground)));
  --apple-primary: var(--primary, #111827);
  --apple-primary-foreground: var(--primary-foreground, #ffffff);
  --apple-secondary: var(--secondary, var(--muted, var(--card)));
  --apple-secondary-foreground: var(--secondary-foreground, var(--foreground));
  --apple-muted: var(--muted, var(--card));
  --apple-muted-foreground: var(--muted-foreground, var(--foreground));
  --apple-accent: var(--accent, var(--secondary, var(--muted, var(--card))));
  --apple-accent-foreground: var(--accent-foreground, var(--foreground));
  --apple-destructive: var(--destructive, #ef4444);
  --apple-destructive-foreground: var(--destructive-foreground, #ffffff);
  --apple-border: var(--border, currentColor);
  --apple-input: var(--input, var(--border));
  --apple-ring: var(--ring, var(--primary));
  --apple-chart-1: var(--chart-1, var(--primary));
  --apple-chart-2: var(--chart-2, var(--secondary, var(--primary)));
  --apple-chart-3: var(--chart-3, var(--accent, var(--primary)));
  --apple-chart-4: var(--chart-4, var(--muted-foreground, var(--foreground)));
  --apple-chart-5: var(--chart-5, var(--foreground));
  --apple-sidebar: var(--sidebar, var(--background));
  --apple-sidebar-foreground: var(--sidebar-foreground, var(--foreground));
  --apple-sidebar-primary: var(--sidebar-primary, var(--primary));
  --apple-sidebar-primary-foreground: var(--sidebar-primary-foreground, var(--primary-foreground));
  --apple-sidebar-accent: var(--sidebar-accent, var(--accent, var(--muted, var(--card))));
  --apple-sidebar-accent-foreground: var(--sidebar-accent-foreground, var(--accent-foreground, var(--foreground)));

/* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* state-warning */
  --state-warning: #d97706;
  --state-warning-surface: rgba(217, 119, 6, 0.12);

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  /* state-warning (dark theme) */
  --state-warning: #f59e0b;
  --state-warning-surface: rgba(245, 158, 11, 0.14);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

<body class="min-h-screen font-sans antialiased">

<main class="flex items-center justify-center min-h-screen px-4 py-8"
      style="background: var(--apple-background);">

  <div class="w-full max-w-sm">

    <!-- Branding -->
    <div class="text-center mb-10">
      <h1 class="text-2xl font-semibold tracking-tight mb-2"
          style="color: var(--apple-foreground); font-family: var(--font-sans); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">
        YT2BILI
      </h1>
      <p class="text-sm" style="color: var(--apple-muted-foreground);">
        YouTube 到 Bilibili 自动化搬运系统
      </p>
    </div>

    <!-- Loading placeholder (shown until init-status resolves to avoid mode flicker) -->
    <div id="login-loading" class="p-8 rounded-xl border"
         style="background: var(--apple-card); border-color: var(--apple-border); box-shadow: var(--shadow-md); border-radius: calc(var(--spacing) * 5); min-height: 200px; display: flex; align-items: center; justify-content: center; color: var(--apple-muted-foreground); font-size: 14px;">
      加载中...
    </div>

    <!-- Card -->
    <div id="login-card" class="p-8 rounded-xl border"
         style="background: var(--apple-card); border-color: var(--apple-border); box-shadow: var(--shadow-md); border-radius: calc(var(--spacing) * 5); display:none;">

      <!-- Initialize mode label -->
      <div class="mb-6">
        <h2 class="text-base font-semibold tracking-tight"
            style="color: var(--apple-card-foreground); font-family: var(--font-sans);">
          设置管理密码
        </h2>
        <p class="text-xs mt-1" style="color: var(--apple-muted-foreground);">
          首次使用，请设置一个安全的管理密码
        </p>
      </div>

      <!-- Password fields -->
      <div class="flex flex-col gap-4">

        <!-- Password -->
        <div>
          <label class="block text-xs font-medium mb-1.5 tracking-tight" style="color: var(--apple-secondary-foreground);">
            密码
          </label>
          <div class="field" style="width: 100%; min-width: 0;">
            <i data-lucide="user" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <input class="control" type="password" placeholder="输入管理密码" autocomplete="new-password">
            <button type="button" class="clear" aria-label="显示密码"
                    style="width: 18px; height: 18px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;">
              <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
        </div>

        <!-- Confirm password -->
        <div>
          <label class="block text-xs font-medium mb-1.5 tracking-tight" style="color: var(--apple-secondary-foreground);">
            确认密码
          </label>
          <div class="field" style="width: 100%; min-width: 0;">
            <i data-lucide="circle-check" style="width: 18px; height: 18px; flex-shrink: 0;"></i>
            <input class="control" type="password" placeholder="再次输入密码" autocomplete="new-password">
            <button type="button" class="clear" aria-label="显示密码"
                    style="width: 18px; height: 18px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;">
              <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
        </div>

      </div>

      <!-- Submit -->
      <div class="mt-6">
        <button class="btn btn-primary w-full"
                data-dom-id="login-submit"
                style="height: 44px; border-radius: calc(var(--spacing) * 5);">
          初始化
        </button>
      </div>

      <!-- Forgot password (login mode, hidden in initialize) -->
      <div class="mt-4 text-center" data-dom-id="forgot-wrap" style="display:none">
        <button type="button" data-dom-id="forgot-password-btn" class="text-xs underline" style="color: var(--apple-muted-foreground); background: none; border: none; cursor: pointer; padding: 0; font-family: var(--font-sans);">
          忘记密码？
        </button>
      </div>

    </div>

    <!-- Footer note -->
    <p class="text-center text-xs mt-6" style="color: var(--apple-muted-foreground);">
      初始化完成后，密码将用于保护管理后台访问
    </p>

  </div>

</main>

<script>
  // ===== 登录页交互脚本 =====
  // 主题初始化（与控制台保持一致）
  (function(){
    try{
      var t=localStorage.getItem('y2b-theme');
      if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}
      var h=document.documentElement;
      if(t==='light'){h.classList.remove('dark');h.setAttribute('data-theme','light');}
      else{h.classList.add('dark');h.setAttribute('data-theme','dark');}
    }catch(e){}
  })();

  // Toast 容器
  (function(){
    var c=document.createElement('div');
    c.id='toast-container';
    c.style.cssText='position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:calc(100vw - 32px)';
    document.body.appendChild(c);
  })();
  function showToast(msg, type){
    type=type||'info';
    var c=document.getElementById('toast-container');
    var t=document.createElement('div');
    var bg='var(--brand-50)', col='var(--brand-600)';
    if(type==='success'){bg='var(--state-success-surface)';col='var(--state-success)';}
    else if(type==='error'){bg='var(--state-error-surface)';col='var(--state-error)';}
    t.style.cssText='pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;box-shadow:var(--shadow-lg);min-width:240px;max-width:360px;font-size:13px;font-weight:500;background:'+bg+';color:'+col+';animation:toast-in .2s ease';
    t.textContent=msg;
    c.appendChild(t);
    setTimeout(function(){
      t.style.opacity='0';
      t.style.transition='opacity .2s';
      setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},200);
    },3000);
  }

  // 模式判断：先尝试调用后端 init-status，失败则按 URL 参数兜底
  var mode='init';
  var submitBtn=document.querySelector('[data-dom-id="login-submit"]');
  var passwordInput=document.querySelectorAll('input[type="password"]')[0];
  var confirmInput=document.querySelectorAll('input[type="password"]')[1];
  var confirmGroup=confirmInput?confirmInput.closest('div'):null;
  var titleEl=document.querySelector('h2');
  var descEl=document.querySelector('h2 + p');
  var forgotWrap=document.querySelector('[data-dom-id="forgot-wrap"]');
  var footerNote=document.querySelector('p.text-center.text-xs.mt-6');

  function applyMode(){
    if(mode==='login'){
      submitBtn.textContent='登录';
      if(titleEl)titleEl.textContent='登录';
      if(descEl)descEl.textContent='请输入管理密码以进入控制台';
      if(confirmGroup)confirmGroup.style.display='none';
      if(forgotWrap)forgotWrap.style.display='';
      if(footerNote)footerNote.textContent='登录后可在控制台右上角切换主题';
      if(passwordInput)passwordInput.setAttribute('placeholder','输入管理密码');
    }else{
      submitBtn.textContent='初始化';
      if(titleEl)titleEl.textContent='设置管理密码';
      if(descEl)descEl.textContent='首次使用，请设置一个安全的管理密码';
      if(confirmGroup)confirmGroup.style.display='';
      if(forgotWrap)forgotWrap.style.display='none';
      if(footerNote)footerNote.textContent='初始化完成后，密码将用于保护管理后台访问';
      if(passwordInput)passwordInput.setAttribute('placeholder','输入管理密码');
    }
  }

  function setBtnLoading(btn, loading, text){
    if(loading){
      btn.dataset.originalText=btn.textContent;
      btn.disabled=true;
      btn.style.opacity='0.7';
      btn.style.position='relative';
      btn.textContent=text||'处理中…';
    }else{
      btn.disabled=false;
      btn.style.opacity='';
      btn.textContent=btn.dataset.originalText||btn.textContent;
    }
  }

  // 密码显示切换
  document.querySelectorAll('.clear[aria-label="显示密码"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var input=btn.parentElement.querySelector('input');
      if(!input)return;
      if(input.type==='password'){
        input.type='text';
        btn.innerHTML='<i data-lucide="eye-off" style="width:16px;height:16px;"></i>';
        btn.setAttribute('aria-label','隐藏密码');
      }else{
        input.type='password';
        btn.innerHTML='<i data-lucide="eye" style="width:16px;height:16px;"></i>';
        btn.setAttribute('aria-label','显示密码');
      }
      if(window.lucide)try{lucide.createIcons();}catch(e){}
    });
  });

  function showForm(){
    var loading=document.getElementById('login-loading');
    var card=document.getElementById('login-card');
    if(loading)loading.style.display='none';
    if(card)card.style.display='';
  }

  // 启动时检查后端初始化状态
  fetch('/api/init-status',{credentials:'include'})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.initialized){
        mode='login';
      }else{
        mode='init';
      }
      applyMode();
      showForm();
    })
    .catch(function(){
      // 后端不可用时按 URL 参数兜底
      var urlMode=new URLSearchParams(location.search).get('mode');
      if(urlMode==='login')mode='login';
      applyMode();
      showForm();
    });

  // 提交逻辑
  function submit(){
    var p=passwordInput.value;
    if(!p){showToast('请输入密码','error');passwordInput.focus();return;}
    if(mode==='init'){
      if(p.length<8){showToast('密码至少 8 位','error');passwordInput.focus();return;}
      if(confirmInput&&p!==confirmInput.value){showToast('两次输入的密码不一致','error');confirmInput.focus();return;}
    }
    setBtnLoading(submitBtn,true,mode==='init'?'初始化中…':'登录中…');
    var url=mode==='init'?'/api/config/init':'/api/login';
    fetch(url,{
      method:'POST',
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:p})
    })
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});})
    .then(function(res){
      setBtnLoading(submitBtn,false);
      if(!res.ok){
        showToast(res.data.error||'操作失败','error');
        return;
      }
      if(mode==='init'){
        showToast('初始化成功，正在进入控制台…','success');
        // 初始化时返回 pipeline_token，提示用户保存
        if(res.data.pipeline_token){
          setTimeout(function(){
            alert('初始化成功！\n\n请保存以下 pipeline_token 到 GitHub Secrets (PIPELINE_TOKEN):\n'+res.data.pipeline_token+'\n\n（也可稍后在控制台查看）');
            location.href='console.html';
          },300);
        }else{
          setTimeout(function(){location.href='console.html';},800);
        }
      }else{
        showToast('登录成功，正在进入控制台…','success');
        setTimeout(function(){location.href='console.html';},800);
      }
    })
    .catch(function(e){
      setBtnLoading(submitBtn,false);
      showToast('网络错误：'+(e.message||e),'error');
    });
  }

  submitBtn.addEventListener('click',function(e){e.preventDefault();submit();});
  // Enter 提交
  [passwordInput,confirmInput].forEach(function(inp){
    if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submit();}});
  });

  // 忘记密码：内联提示密码重置方式
  var forgotBtn=document.querySelector('[data-dom-id="forgot-password-btn"]');
  if(forgotBtn){
    forgotBtn.addEventListener('click',function(){
      // 创建内联 modal 提示密码重置方式
      var overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px;';
      var card=document.createElement('div');
      card.style.cssText='background:var(--apple-background,#fff);border-radius:16px;padding:24px;max-width:420px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.2);';
      var title=document.createElement('h3');
      title.textContent='重置管理密码';
      title.style.cssText='font-size:16px;font-weight:600;margin:0 0 12px 0;color:var(--apple-foreground,#000);';
      var msg=document.createElement('p');
      msg.textContent='密码不可在线重置。请管理员执行以下步骤:';
      msg.style.cssText='font-size:13px;color:var(--apple-muted-foreground,#666);margin:0 0 12px 0;line-height:1.5;';
      var steps=document.createElement('ol');
      steps.style.cssText='font-size:13px;color:var(--apple-foreground,#000);margin:0 0 16px 0;padding-left:20px;line-height:1.7;';
      steps.innerHTML='<li>登录 Cloudflare Dashboard</li><li>进入 Workers & Pages → 选择本 Worker</li><li>切换到 KV 标签页</li><li>选择 YT2BILI_KV 命名空间</li><li>删除 <code style="background:var(--apple-secondary,#eee);padding:2px 6px;border-radius:4px;font-family:monospace;">config</code> 键</li><li>访问 /login.html 重新初始化</li>';
      var btnRow=document.createElement('div');
      btnRow.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
      var copyBtn=document.createElement('button');
      copyBtn.textContent='复制文本';
      copyBtn.type='button';
      copyBtn.style.cssText='font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid var(--apple-border,#ddd);background:var(--apple-secondary,#f5f5f5);color:var(--apple-foreground,#000);cursor:pointer;';
      copyBtn.onclick=function(){
        var txt='密码不可在线重置。请管理员执行以下步骤:\n1. 登录 Cloudflare Dashboard\n2. 进入 Workers & Pages → 选择本 Worker\n3. 切换到 KV 标签页\n4. 选择 YT2BILI_KV 命名空间\n5. 删除 config 键\n6. 访问 /login.html 重新初始化';
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(txt).then(function(){
            copyBtn.textContent='已复制';
            setTimeout(function(){copyBtn.textContent='复制文本';},2000);
          }).catch(function(){
            copyBtn.textContent='复制失败';
            setTimeout(function(){copyBtn.textContent='复制文本';},2000);
          });
        }else{
          // Fallback: textarea + execCommand
          var ta=document.createElement('textarea');
          ta.value=txt;
          document.body.appendChild(ta);
          ta.select();
          try{document.execCommand('copy');copyBtn.textContent='已复制';setTimeout(function(){copyBtn.textContent='复制文本';},2000);}catch(e){}
          document.body.removeChild(ta);
        }
      };
      var closeBtn=document.createElement('button');
      closeBtn.textContent='关闭';
      closeBtn.type='button';
      closeBtn.style.cssText='font-size:13px;padding:8px 16px;border-radius:8px;border:none;background:var(--brand-600,#3b82f6);color:#fff;cursor:pointer;';
      closeBtn.onclick=function(){
        document.body.removeChild(overlay);
      };
      btnRow.appendChild(copyBtn);
      btnRow.appendChild(closeBtn);
      card.appendChild(title);
      card.appendChild(msg);
      card.appendChild(steps);
      card.appendChild(btnRow);
      overlay.appendChild(card);
      // 点击遮罩外区域关闭
      overlay.addEventListener('click',function(e){
        if(e.target===overlay){
          document.body.removeChild(overlay);
        }
      });
      document.body.appendChild(overlay);
    });
  }

  if(window.lucide)try{lucide.createIcons();}catch(e){}
</script>
<style>
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</body>
</html>
