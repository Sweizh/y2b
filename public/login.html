<!DOCTYPE html>
<html lang="zh-CN" class="dark" data-theme="dark" style="color-scheme: dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c100f">
    <title>YT2BILI · 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="/css/dist/app.css">
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen antialiased">

<main class="relative flex min-h-screen items-center justify-center overflow-hidden px-4 py-10">

  <!-- 背景装饰:左侧大号衬线品牌字(极淡,印刷感) -->
  <div aria-hidden="true" class="pointer-events-none absolute inset-0 flex items-center">
    <span style="position:absolute; left:-2vw; top:50%; transform:translateY(-50%); font-family:var(--font-serif); font-size:min(42vw,46rem); font-weight:400; line-height:0.8; color:var(--fg); opacity:0.022; font-variation-settings:'opsz' 144,'SOFT' 0; letter-spacing:-0.04em; user-select:none;">Y</span>
    <span style="position:absolute; right:-2vw; bottom:8vh; font-family:var(--font-mono); font-size:11px; color:var(--fg-dim); opacity:0.5; letter-spacing:0.2em; writing-mode:vertical-rl;">YT → BILI · BROADCASTING CONSOLE</span>
  </div>

  <div class="relative w-full" style="max-width:380px;">

    <!-- 品牌区:terminal-style eyebrow + 大号衬线标题 -->
    <header class="mb-10 reveal">
      <div class="eyebrow mb-4">Console · 2024</div>
      <h1 class="display-title" style="font-size:42px;">
        YT<em>2</em>BILI
      </h1>
      <p class="body-muted mt-3" style="max-width:300px;">
        YouTube 到 Bilibili 的自动化搬运系统。请通过管理密码进入。
      </p>
    </header>

    <!-- 加载占位(init-status 解析前显示,避免模式闪烁) -->
    <div id="login-loading" class="reveal reveal-1" style="padding:32px 28px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); min-height:240px; display:flex; align-items:center; justify-content:center; color:var(--fg-muted); font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em;">
      <span style="display:inline-flex; align-items:center; gap:8px;">
        <span style="width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.4s ease-in-out infinite;"></span>
        正在校验会话…
      </span>
    </div>

    <!-- 卡片 -->
    <div id="login-card" class="reveal reveal-2" style="padding:28px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-md); display:none;">

      <!-- 模式标签:初始化 / 登录 -->
      <div class="mb-6">
        <div class="eyebrow mb-2" data-dom-id="login-mode-label">Initialize</div>
        <h2 class="display-title" style="font-size:22px;" data-dom-id="login-mode-title">
          设置<em>管理密码</em>
        </h2>
        <p class="body-muted mt-1.5" data-dom-id="login-mode-desc" style="font-size:12px;">
          首次使用,请设置一个安全的管理密码。
        </p>
      </div>

      <!-- 密码字段 -->
      <div class="flex flex-col gap-4">

        <!-- 密码 -->
        <div>
          <label class="block mb-2" style="font-family:var(--font-mono); font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-muted);">
            密码
          </label>
          <div class="field">
            <i data-lucide="key-round" style="width:16px; height:16px; flex-shrink:0; color:var(--fg-muted);"></i>
            <input class="control" type="password" name="password" placeholder="输入管理密码" autocomplete="new-password" style="font-family:var(--font-mono); font-size:13px; letter-spacing:0.08em;">
            <button type="button" class="clear" aria-label="显示密码" style="width:18px; height:18px;">
              <i data-lucide="eye" style="width:16px; height:16px;"></i>
            </button>
          </div>
        </div>

        <!-- 确认密码 -->
        <div>
          <label class="block mb-2" style="font-family:var(--font-mono); font-size:10px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-muted);">
            确认密码
          </label>
          <div class="field">
            <i data-lucide="shield-check" style="width:16px; height:16px; flex-shrink:0; color:var(--fg-muted);"></i>
            <input class="control" type="password" name="password-confirm" placeholder="再次输入密码" autocomplete="new-password" style="font-family:var(--font-mono); font-size:13px; letter-spacing:0.08em;">
            <button type="button" class="clear" aria-label="显示密码" style="width:18px; height:18px;">
              <i data-lucide="eye" style="width:16px; height:16px;"></i>
            </button>
          </div>
        </div>

      </div>

      <!-- 提交 -->
      <div class="mt-6">
        <button class="btn btn-primary w-full" data-dom-id="login-submit" style="height:48px; letter-spacing:0.02em;">
          初始化
        </button>
      </div>

      <!-- 忘记密码(登录模式显示) -->
      <div class="mt-5 text-center" data-dom-id="forgot-wrap" style="display:none">
        <button type="button" data-dom-id="forgot-password-btn" class="btn-link" style="font-family:var(--font-sans);">
          忘记密码?
        </button>
      </div>

    </div>

    <!-- 页脚注释 -->
    <p class="mt-6 reveal reveal-3" style="font-family:var(--font-mono); font-size:10px; color:var(--fg-dim); letter-spacing:0.08em; text-align:center;">
      初始化完成后,密码将用于保护后台访问 · ENCRYPTED IN KV
    </p>

  </div>

</main>

<style>
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
</style>

<script type="module" src="/js/dist/login.js"></script>
</body>
</html>
