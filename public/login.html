<!DOCTYPE html>
<html lang="zh-CN" class="dark" data-theme="dark" style="color-scheme: dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c100f">
    <title>YT2BILI · 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/dist/app.css">
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen antialiased">

<main class="flex min-h-screen items-center justify-center px-4 py-10">
  <div class="w-full" style="max-width:380px;">

    <!-- 品牌:简洁文字 logo -->
    <div class="mb-8 text-center">
      <span class="text-xl font-semibold tracking-tight" style="color:var(--foreground);">YT2BILI</span>
    </div>

    <!-- 加载占位:init-status 解析前显示,避免模式闪烁 -->
    <div id="login-loading" class="surface-card flex items-center justify-center" style="min-height:240px; padding:32px; color:var(--muted-foreground); font-size:13px;">
      <span class="inline-flex items-center gap-2">
        <span class="login-pulse"></span>
        正在校验会话…
      </span>
    </div>

    <!-- 登录卡片 -->
    <div id="login-card" class="surface-card" style="display:none; padding:32px;">

      <!-- 模式标签:初始化 / 登录 -->
      <div class="mb-1 text-xs font-medium" data-dom-id="login-mode-label" style="color:var(--muted-foreground);">Initialize</div>
      <h2 class="text-xl font-semibold tracking-tight" data-dom-id="login-title" style="color:var(--foreground);">设置管理密码</h2>
      <p class="mt-1.5 text-sm" data-dom-id="login-desc" style="color:var(--muted-foreground);">首次使用,请设置一个安全的管理密码。</p>

      <!-- 表单 -->
      <div class="mt-6 flex flex-col gap-4">

        <!-- 密码 -->
        <div>
          <label for="login-password" class="mb-1.5 block text-xs font-medium" style="color:var(--muted-foreground);">密码</label>
          <div class="field">
            <i data-lucide="key-round" style="width:16px; height:16px; flex-shrink:0; color:var(--muted-foreground);"></i>
            <input id="login-password" class="control" type="password" name="password" placeholder="输入管理密码" autocomplete="new-password">
            <button type="button" class="clear" aria-label="显示密码" style="width:18px; height:18px;">
              <i data-lucide="eye" style="width:16px; height:16px;"></i>
            </button>
          </div>
        </div>

        <!-- 确认密码 -->
        <div>
          <label for="login-password-confirm" class="mb-1.5 block text-xs font-medium" style="color:var(--muted-foreground);">确认密码</label>
          <div class="field">
            <i data-lucide="shield-check" style="width:16px; height:16px; flex-shrink:0; color:var(--muted-foreground);"></i>
            <input id="login-password-confirm" class="control" type="password" name="password-confirm" placeholder="再次输入密码" autocomplete="new-password">
            <button type="button" class="clear" aria-label="显示密码" style="width:18px; height:18px;">
              <i data-lucide="eye" style="width:16px; height:16px;"></i>
            </button>
          </div>
        </div>

      </div>

      <!-- 提交 -->
      <button class="btn-accent w-full mt-6" data-dom-id="login-submit" style="height:44px;">
        初始化
      </button>

      <!-- 忘记密码(登录模式显示) -->
      <div class="mt-4 text-center" data-dom-id="forgot-wrap" style="display:none">
        <button type="button" data-dom-id="forgot-password-btn" class="btn-link">忘记密码?</button>
      </div>

    </div>

    <!-- 页脚注释 -->
    <p class="text-center text-xs mt-6" style="color:var(--muted-foreground);">
      初始化完成后,密码将用于保护后台访问
    </p>

  </div>
</main>

<style>
  .login-pulse {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 9999px;
    background: var(--primary);
    animation: login-pulse-anim 1.4s ease-in-out infinite;
  }
  @keyframes login-pulse-anim {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
</style>

<script type="module" src="/js/dist/login.js"></script>
</body>
</html>
